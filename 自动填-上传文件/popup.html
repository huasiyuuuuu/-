<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>账号填充助手</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <h1>账号填充助手</h1>
          <p id="statusText">粘贴后自动识别；在网页上点 Fill 或用下面的按钮填入。</p>
        </div>
      </header>

      <section class="panel">
        <label class="field">
          <span>粘贴卡密 / 账号 / 账单文本</span>
          <textarea id="quickImport" rows="4" spellcheck="false"
            placeholder="Gmail: email|password|recovery|2FA|year|country
GitHub: username----password----2FA
账单: 直接粘贴页面文本"></textarea>
        </label>
        <div class="row-2">
          <button id="pasteImport" type="button">读剪贴板并识别</button>
          <button id="clearImport" type="button" class="ghost">清空</button>
        </div>
        <div id="message" class="banner" role="status"></div>
      </section>

      <section id="results" class="results" aria-label="识别结果"></section>

      <section class="panel actions">
        <button id="fillAuto" class="primary hero" type="button">一键填当前页</button>
        <div class="row-2">
          <button id="fillBilling" type="button">填账单</button>
          <button id="fillSmsCode" type="button">取并填验证码</button>
        </div>

        <details class="more">
          <summary>更多工具</summary>
          <div class="row-2">
            <button id="capturePage" type="button">识别当前页</button>
            <button id="openKiroHome" type="button">打开 Kiro</button>
            <button id="saveFolder" type="button">保存到文件夹</button>
            <button id="exportGoogleCsv" type="button">导出密码 CSV</button>
          </div>
          <button id="clearSiteData" type="button" class="danger">深度清理当前站点</button>
        </details>

        <div class="settings">
          <label class="toggle">
            <input id="autoFillOnHover" type="checkbox">
            <span>在支持页面显示右侧悬浮 Fill 按钮</span>
          </label>
          <label class="toggle">
            <input id="overwriteExisting" type="checkbox">
            <span>覆盖已有字段（治"填不进去"）</span>
          </label>
        </div>
      </section>
    </main>

    <script src="shared.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
